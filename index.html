<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Pro Ultra</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  padding: 20px;
}

button {
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: #00ffcc;
  font-weight: bold;
  width: 85%;
}

input {
  width: 80%;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Color Pro Ultra</h1>

  <p>🌈 Saturação</p>
  <input type="range" min="100" max="300" value="160" id="sat">

  <p>✨ Brilho</p>
  <input type="range" min="100" max="200" value="120" id="bright">

  <p>⚡ Contraste</p>
  <input type="range" min="100" max="300" value="180" id="cont">

  <button onclick="ativar()">🚀 Ativar Ultra Cor</button>
  <button onclick="desativar()">❌ Desativar</button>
</div>

<div id="overlay"></div>

<script>
function ativar() {
  let s = document.getElementById("sat").value;
  let b = document.getElementById("bright").value;
  let c = document.getElementById("cont").value;

  let overlay = document.getElementById("overlay");
  overlay.style.display = "block";
  overlay.style.backdropFilter = 
    `saturate(${s}%) brightness(${b}%) contrast(${c}%)`;
}

function desativar() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
