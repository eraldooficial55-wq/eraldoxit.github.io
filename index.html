<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>BOOST GAMER APP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00ffcc;
}

/* vídeo */
#bgVideo {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 130%;
  height: 130%;
  transform: translate(-50%, -50%);
  z-index: -2;
  filter: brightness(1.1) blur(2px);
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

/* título */
h1 {
  text-align: center;
  text-shadow: 0 0 15px #00ffcc;
}

/* card */
.card {
  background: rgba(0,0,0,0.6);
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 15px #00ffcc;
}

/* botão */
.btn {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  background: #00ffcc;
  color: black;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  text-decoration: none;
}

/* input */
input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}

/* esconder */
#app { display: none; }

/* som */
.sound {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #00ffcc;
  color: black;
  text-align: center;
  line-height: 55px;
  font-size: 20px;
}
</style>
</head>

<body>

</html>
