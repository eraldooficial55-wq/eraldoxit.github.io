<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOST APP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00ffcc;
}

/* vídeo fundo */
#bgVideo {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 130%;
  height: 130%;
  transform: translate(-50%, -50%);
  z-index: -2;
  filter: brightness(1.1) blur(2px);
}

/* topo */
header {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  text-shadow: 0 0 10px #00ffcc;
}

/* abas */
.tabs {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.6);
  padding: 10px;
}

.tab {
  cursor: pointer;
  color: #00ffcc;
}

/* cards */
.card {
  background: rgba(0,0,0,0.6);
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 15px #00ffcc;
}

/* botão */
.btn {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  background: #00ffcc;
  color: black;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  text-decoration: none;
}

/* input */
input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  border-radius: 10px;
}

/* escondido */
.section { display: none; }
.active { display: block; }

/* whatsapp */
.whats {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #00ffcc;
  color: black;
  padding: 12px;
  border-radius: 20px;
  font-weight: bold;
  text-decoration: none;
}

/* som */
.sound {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00ffcc;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  text-align: center;
  line-height: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- vídeo -->
<iframe id="bgVideo"
src="https://www.youtube.com/embed/fvVHGGh2Nqw?autoplay=1&mute=1&loop=1&playlist=fvVHGGh2Nqw&controls=0"
frameborder="0"
allow="autoplay">
</iframe>

<header>🔥 BOOST GAMER APP 🔥</header>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>🔐 Entrar</h3>
  <input id="senha" placeholder="Senha">
  <button class="btn" onclick="login()">ACESSAR</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="tabs">
    <div class="tab" onclick="show('home')">Home</div>
    <div class="tab" onclick="show('config')">Configs</div>
    <div class="tab" onclick="show('contato')">Contato</div>
  </div>

  <!-- HOME -->
  <div id="home" class="section active">
    <div class="card">
      <h2>🔥 Bem-vindo</h2>
      <p>Melhore sua jogabilidade com configs otimizadas 📱</p>
    </div>
  </div>

  <!-- CONFIG -->
  <div id="config" class="section">
    <div class="card">
      <h3>SL PRO</h3>
      <a class="btn" href="https://wa.me/5591985663181">QUERO</a>
    </div>

    <div class="card">
      <h3>SL PRO MAX</h3>
      <a class="btn" href="https://wa.me/5591985663181">QUERO</a>
    </div>

    <div class="card">
      <h3>PACK PREMIUM</h3>
      <p>DPI + otimização para todos dispositivos 📲</p>
      <a class="btn" href="https://wa.me/5591985663181">QUERO</a>
    </div>
  </div>

  <!-- CONTATO -->
  <div id="contato" class="section">
    <div class="card">
      <a class="btn" href="https://youtube.com/@comboxit100">YouTube</a>
      <a class="btn" href="https://www.instagram.com/eraldo._x">Instagram</a>
    </div>
  </div>

</div>

<!-- botões flutuantes -->
<a class="whats" href="https://wa.me/5591985663181">💬</a>
<div class="sound" onclick="sound()">🔊</div>

<script>
function login(){
  let s = document.getElementById("senha").value;
  if(s === "vip123"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Senha errada ❌");
  }
}

function show(id){
  document.querySelectorAll(".section").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function sound(){
  let v = document.getElementById("bgVideo");
  v.src = "https://www.youtube.com/embed/fvVHGGh2Nqw?autoplay=1&loop=1&playlist=fvVHGGh2Nqw";
}
</script>

</body>
</html>
